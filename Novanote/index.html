<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Novanote</title>
</head>
<body>
    <div class="mainDiv">
        <h1>Novanote</h1>
        <div class="center-image">
            <img src="./assets/menu.png" alt="Center image">
        </div>
        <div class="home-buttons">
            <button id="start-btn">START TODAY</button>
            <button id="history-btn">VIEW HISTORY</button>
        </div>
    </div>

    <script>
        document.getElementById("start-btn").addEventListener("click", () => {
            window.electronAPI.loadPage("dashboard.html");
        });
        document.getElementById("history-btn").addEventListener("click", () => {
            window.electronAPI.loadPage("history.html");
        });
    </script>
</body>
</html>
